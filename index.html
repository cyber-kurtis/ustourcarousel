<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Delta Marble Stone · 2026 Fiyat Kataloğu</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{margin:0;padding:0}
body{
  background:#f4f3f0;
  color:#1a1c1b;
  font-family:'Instrument Sans',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  min-height:100vh;
}
input[type="search"]::-webkit-search-cancel-button{-webkit-appearance:none}
input[type="search"]::-webkit-search-decoration{-webkit-appearance:none}
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type="number"]{-moz-appearance:textfield}
button{-webkit-tap-highlight-color:transparent}

.dk-scroll::-webkit-scrollbar{height:0;width:0}
.dk-scroll{scrollbar-width:none}

@keyframes dkFade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes dkPop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}

.dk-header{
  position:sticky;top:0;z-index:30;
  background:color-mix(in srgb,#f4f3f0 88%,transparent);
  backdrop-filter:saturate(1.4) blur(14px);
  -webkit-backdrop-filter:saturate(1.4) blur(14px);
  border-bottom:1px solid #e7e5e0;
}
.dk-header-inner{max-width:780px;margin:0 auto;padding:14px 18px 0}
.dk-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.dk-brand{font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:#8a8d88}
.dk-title{margin:2px 0 0;font-size:21px;line-height:1.1;font-weight:700;letter-spacing:-.01em}
.dk-info-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px}
.dk-info-text{font-size:13px;color:#8a8d88}
.dk-info-text strong{color:#1a1c1b;font-weight:600}

.dk-currency-group{
  display:inline-flex;gap:4px;
  background:#fff;border:1px solid #e7e5e0;
  border-radius:999px;padding:3px;
}
.dk-currency-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 11px;border:none;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:600;
  border-radius:999px;background:transparent;color:#8a8d88;
  transition:background .15s,color .15s;
}
.dk-currency-btn.active{background:#1a1c1b;color:#fff}

.dk-search{
  display:flex;align-items:center;gap:10px;
  margin-top:12px;padding:11px 14px;
  background:#fff;border:1px solid #e7e5e0;border-radius:14px;
}
.dk-search svg{color:#8a8d88;flex:none}
.dk-search input{
  flex:1;min-width:0;border:none;outline:none;
  background:transparent;font-family:inherit;
  font-size:15px;color:#1a1c1b;
}
.dk-search input::placeholder{color:#8a8d88}
.dk-search-clear{
  flex:none;border:none;background:transparent;
  cursor:pointer;color:#8a8d88;padding:2px;
  font-size:18px;line-height:1;
}

.dk-discount-row{
  display:flex;gap:7px;margin-top:12px;
  overflow-x:auto;scrollbar-width:none;
}
.dk-discount-label{
  flex:none;align-self:center;
  font-size:11px;font-weight:600;
  letter-spacing:.14em;text-transform:uppercase;
  color:#8a8d88;padding-right:2px;
}
.dk-discount-btn{
  flex:none;padding:6px 13px;
  border-radius:999px;border:1px solid #e7e5e0;
  cursor:pointer;font-family:inherit;
  font-size:13px;font-weight:600;
  background:transparent;color:#1a1c1b;
  transition:background .15s,color .15s,border-color .15s;
}
.dk-discount-btn.active{
  background:#1a1c1b;color:#fff;border-color:#1a1c1b;
}

.dk-category-row{
  display:flex;gap:4px;margin-top:12px;
  overflow-x:auto;scrollbar-width:none;
}
.dk-category-btn{
  flex:none;position:relative;
  padding:10px 4px 11px;margin-right:14px;
  border:none;background:transparent;cursor:pointer;
  font-family:inherit;font-size:13.5px;font-weight:600;
  white-space:nowrap;color:#8a8d88;
  transition:color .15s;
}
.dk-category-btn .count{font-weight:500;color:#8a8d88}
.dk-category-btn::after{
  content:'';position:absolute;
  left:0;right:0;bottom:-1px;
  height:2px;border-radius:2px;
  background:transparent;
  transition:background .15s;
}
.dk-category-btn.active{color:#1a1c1b}
.dk-category-btn.active::after{background:#1a1c1b}

.dk-main{max-width:780px;margin:0 auto;padding:16px 18px 64px}
.dk-empty{text-align:center;padding:64px 20px;color:#8a8d88}
.dk-empty p{font-size:15px}
.dk-empty button{
  margin-top:14px;padding:8px 16px;
  border-radius:999px;border:1px solid #e7e5e0;
  background:#fff;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:600;
  color:#1a1c1b;
}

.dk-cards{display:flex;flex-direction:column;gap:10px}

.dk-card{
  display:flex;gap:14px;padding:12px;
  background:#fff;border:1px solid #e7e5e0;
  border-radius:18px;
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 10px 26px -20px rgba(0,0,0,.22);
  animation:dkFade .22s ease both;
}
.dk-thumb{
  flex:none;width:86px;height:86px;
  border-radius:12px;overflow:hidden;
  background:linear-gradient(135deg,color-mix(in srgb,#1a1c1b 6%,#f4f3f0) 0%,color-mix(in srgb,#1a1c1b 12%,#f4f3f0) 100%);
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.dk-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.dk-card-body{flex:1;min-width:0;display:flex;flex-direction:column}
.dk-card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dk-card-code{font-size:11.5px;font-weight:600;letter-spacing:.03em;color:#1a1c1b}
.dk-card-cat{font-size:10.5px;font-weight:600;letter-spacing:.04em;color:#8a8d88}
.dk-stock-badge{
  display:inline-flex;align-items:center;gap:4px;
  margin-left:auto;padding:2px 8px;
  border-radius:999px;border:1px solid #e7e5e0;
  font-size:10.5px;font-weight:600;
  color:#8a8d88;background:transparent;
}
.dk-stock-dot{width:5px;height:5px;border-radius:999px;background:#8a8d88}
.dk-card-name{
  margin:5px 0 0;font-size:15px;line-height:1.25;
  font-weight:600;letter-spacing:-.005em;text-wrap:pretty;
}
.dk-card-size{margin:3px 0 0;font-size:12.5px;color:#8a8d88}
.dk-card-footer{
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:10px;margin-top:auto;padding-top:10px;
}
.dk-price-label{font-size:10.5px;font-weight:600;letter-spacing:.01em;color:#8a8d88}
.dk-price-value{margin:1px 0 0;font-size:19px;font-weight:700;letter-spacing:-.01em;line-height:1.1}
.dk-price-list{margin:1px 0 0;font-size:12px;color:#8a8d88;text-decoration:line-through}
.dk-copy-btn{
  flex:none;display:inline-flex;align-items:center;gap:6px;
  padding:8px 13px;border-radius:999px;
  border:1px solid #e7e5e0;cursor:pointer;
  font-family:inherit;font-size:12.5px;font-weight:600;
  background:transparent;color:#1a1c1b;
  transition:background .15s,color .15s,border-color .15s;
}
.dk-copy-btn.copied{background:#1a1c1b;color:#fff;border-color:#1a1c1b}

.dk-footer-note{margin:22px 4px 0;font-size:11.5px;line-height:1.5;color:#8a8d88}

.dk-overlay{
  position:fixed;inset:0;z-index:60;
  background:rgba(20,22,20,.42);
  backdrop-filter:blur(3px);
  display:flex;align-items:flex-end;justify-content:center;
  padding:0;
}
.dk-modal{
  width:100%;max-width:440px;
  background:#fff;border-radius:22px 22px 0 0;
  padding:22px 22px calc(22px + env(safe-area-inset-bottom));
  animation:dkPop .18s ease;
  box-shadow:0 -10px 40px rgba(0,0,0,.18);
}
.dk-modal-handle{width:38px;height:4px;border-radius:999px;background:#e7e5e0;margin:0 auto 16px}
.dk-modal-brand{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#8a8d88}
.dk-modal-title{margin:3px 0 0;font-size:18px;font-weight:700}
.dk-modal label{display:block;margin-top:16px}
.dk-modal label span{display:block;font-size:13px;color:#8a8d88;margin-bottom:7px}
.dk-modal input[type="number"]{
  width:100%;padding:13px 15px;
  border:1px solid #e7e5e0;border-radius:12px;
  font-family:'Instrument Sans',system-ui,sans-serif;
  font-size:17px;font-weight:600;outline:none;
  background:#f4f3f0;color:#1a1c1b;
}
.dk-modal-error{margin:8px 2px 0;font-size:12.5px;color:#c0392b;display:none}
.dk-modal-error.show{display:block}
.dk-modal-actions{display:flex;gap:10px;margin-top:18px}
.dk-modal-cancel{
  flex:1;padding:13px;border-radius:12px;
  border:1px solid #e7e5e0;background:transparent;
  cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:#1a1c1b;
}
.dk-modal-apply{
  flex:1.4;padding:13px;border-radius:12px;
  border:none;background:#1a1c1b;color:#fff;
  cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;
}
</style>
</head>
<body>

<header class="dk-header">
  <div class="dk-header-inner">

    <div class="dk-title-row">
      <div>
        <p class="dk-brand">Delta Marble Stone</p>
        <h1 class="dk-title">2026 Fiyat Kataloğu</h1>
      </div>
    </div>

    <div class="dk-info-row">
      <span class="dk-info-text"><strong id="resultCount">0</strong> ürün · <span id="currencyStatus">TRY · KDV hariç</span></span>
      <div class="dk-currency-group" id="currencyGroup"></div>
    </div>

    <label class="dk-search">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg>
      <input type="search" id="searchInput" autocomplete="off" placeholder="Ürün adı, kod veya ebat ara" />
      <button type="button" class="dk-search-clear" id="searchClear" style="display:none">×</button>
    </label>

    <div class="dk-discount-row dk-scroll" id="discountRow"></div>
    <div class="dk-category-row dk-scroll" id="categoryRow"></div>

  </div>
</header>

<main class="dk-main">
  <div id="emptyState" class="dk-empty" style="display:none">
    <p id="emptyText"></p>
    <button type="button" id="emptyClear">Aramayı temizle</button>
  </div>
  <div class="dk-cards" id="cardList"></div>
  <p class="dk-footer-note">Gösterilen fiyatlar liste fiyatlarıdır, KDV hariçtir. İskonto seçildiğinde tüm fiyatlar aynı oranda güncellenir. Yabancı para fiyatları girilen kura göre hesaplanır.</p>
</main>

<div class="dk-overlay" id="rateOverlay" style="display:none">
  <div class="dk-modal" id="rateModal">
    <div class="dk-modal-handle"></div>
    <p class="dk-modal-brand">Kur bilgisi</p>
    <h2 class="dk-modal-title" id="rateTitle"></h2>
    <label>
      <span id="rateLabel"></span>
      <input type="number" inputmode="decimal" min="0" step="0.01" id="rateInput" placeholder="örn. 53" />
    </label>
    <p class="dk-modal-error" id="rateError">Geçerli bir kur gir.</p>
    <div class="dk-modal-actions">
      <button type="button" class="dk-modal-cancel" id="rateCancel">Vazgeç</button>
      <button type="button" class="dk-modal-apply" id="rateApply">Uygula</button>
    </div>
  </div>
</div>

<script src="./catalog-data.js"></script>
<script>
(function() {
  'use strict';

  const catalog = window.CATALOG_DATA || { products: [], discounts: [] };

  const state = {
    query: '',
    discount: 0,
    currency: 'TRY',
    rates: { TRY: 1, EUR: null, USD: null },
    category: 'ALL',
    copiedId: null,
    pendingCurrency: null,
  };

  const fmt = {
    TRY: new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY', maximumFractionDigits: 0 }),
    EUR: new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2, maximumFractionDigits: 2 }),
    USD: new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'USD', minimumFractionDigits: 2, maximumFractionDigits: 2 }),
  };

  function normalize(v) {
    return String(v || '')
      .toLocaleLowerCase('tr-TR')
      .normalize('NFD')
      .replace(/[̀-ͯ]/g, '')
      .replace(/ı/g, 'i')
      .replace(/[^a-z0-9]+/g, ' ')
      .trim();
  }

  function roundUp5(v) {
    return Number((Math.ceil((v - Number.EPSILON) / 0.05) * 0.05).toFixed(2));
  }

  function displayValue(tryValue) {
    if (tryValue === null || tryValue === undefined || Number.isNaN(Number(tryValue))) return null;
    if (state.currency === 'TRY') return Math.round(Number(tryValue));
    const rate = state.rates[state.currency];
    if (!rate) return null;
    return roundUp5(Number(tryValue) / rate);
  }

  function formatPrice(v) {
    if (v === null || v === undefined || Number.isNaN(Number(v))) return '—';
    return fmt[state.currency].format(v);
  }

  function discountedTry(p) {
    const price = Number(p.listPrice);
    if (!Number.isFinite(price)) return null;
    return price * (1 - state.discount / 100);
  }

  function matches(p, nq) {
    if (!nq) return true;
    const hay = normalize([p.code, p.name, p.size, p.sourceCategory, p.mainCategory].join(' '));
    const ch = hay.replace(/\s+/g, '');
    const cq = nq.replace(/\s+/g, '');
    return hay.includes(nq) || ch.includes(cq);
  }

  function stockMeta(p) {
    const raw = p.stock || p.stockStatus || null;
    const key = raw ? String(raw).toLocaleLowerCase('tr-TR') : null;
    if (!key) {
      return { label: 'Stok —', dot: '#8a8d88', fg: '#8a8d88', border: '#e7e5e0', bg: 'transparent' };
    }
    if (/(tüken|yok|out|0)/.test(key))
      return { label: raw, dot: '#c0392b', fg: '#c0392b', border: 'color-mix(in srgb,#c0392b 30%,transparent)', bg: 'color-mix(in srgb,#c0392b 8%,transparent)' };
    if (/(az|düşük|low|kısıt)/.test(key))
      return { label: raw, dot: '#c98a14', fg: '#a06d05', border: 'color-mix(in srgb,#c98a14 32%,transparent)', bg: 'color-mix(in srgb,#c98a14 10%,transparent)' };
    return { label: raw, dot: '#1f9d55', fg: '#157a40', border: 'color-mix(in srgb,#1f9d55 30%,transparent)', bg: 'color-mix(in srgb,#1f9d55 8%,transparent)' };
  }

  const $ = id => document.getElementById(id);

  const els = {
    resultCount: $('resultCount'),
    currencyStatus: $('currencyStatus'),
    currencyGroup: $('currencyGroup'),
    searchInput: $('searchInput'),
    searchClear: $('searchClear'),
    discountRow: $('discountRow'),
    categoryRow: $('categoryRow'),
    emptyState: $('emptyState'),
    emptyText: $('emptyText'),
    emptyClear: $('emptyClear'),
    cardList: $('cardList'),
    rateOverlay: $('rateOverlay'),
    rateModal: $('rateModal'),
    rateTitle: $('rateTitle'),
    rateLabel: $('rateLabel'),
    rateInput: $('rateInput'),
    rateError: $('rateError'),
    rateCancel: $('rateCancel'),
    rateApply: $('rateApply'),
  };

  let copyTimeout = null;

  const categories = [
    { id: 'ALL', label: 'Tümü' },
    { id: 'TRAVERTINE', label: 'Travertine' },
    { id: 'SPLITFACE & MOSAICS', label: 'Splitface & Mozaik' },
    { id: 'WASH BASINS & KITCHEN SINKS', label: 'Lavabo & Eviye' },
  ];

  const currencies = [
    { code: 'TRY', symbol: '₺' },
    { code: 'EUR', symbol: '€' },
    { code: 'USD', symbol: '$' },
  ];

  function buildCurrencyButtons() {
    els.currencyGroup.innerHTML = '';
    currencies.forEach(c => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'dk-currency-btn' + (state.currency === c.code ? ' active' : '');
      btn.innerHTML = '<span>' + c.symbol + '</span><span>' + c.code + '</span>';
      btn.addEventListener('click', () => selectCurrency(c.code));
      els.currencyGroup.appendChild(btn);
    });
  }

  function buildDiscountButtons() {
    els.discountRow.innerHTML = '<span class="dk-discount-label">İskonto</span>';
    [0, ...catalog.discounts].forEach(r => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'dk-discount-btn' + (state.discount === r ? ' active' : '');
      btn.textContent = r === 0 ? 'Liste' : '%' + r;
      btn.addEventListener('click', () => {
        state.discount = r;
        render();
      });
      els.discountRow.appendChild(btn);
    });
  }

  function buildCategoryTabs(byQuery) {
    els.categoryRow.innerHTML = '';
    categories.forEach(c => {
      const count = c.id === 'ALL' ? byQuery.length : byQuery.filter(p => p.mainCategory === c.id).length;
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'dk-category-btn' + (state.category === c.id ? ' active' : '');
      btn.innerHTML = c.label + ' <span class="count">' + count + '</span>';
      btn.addEventListener('click', () => {
        state.category = c.id;
        render();
      });
      els.categoryRow.appendChild(btn);
    });
  }

  function buildCard(p) {
    const sm = stockMeta(p);
    const activeTry = discountedTry(p);
    const activeVal = displayValue(activeTry);
    const listVal = displayValue(p.listPrice);
    const activeText = formatPrice(activeVal);
    const listText = formatPrice(listVal);
    const priceLabel = state.discount ? '%' + state.discount + ' iskontolu' : 'Liste fiyatı';
    const isCopied = state.copiedId === p.id;
    const isError = state.copiedId === 'ERR:' + p.id;

    const card = document.createElement('article');
    card.className = 'dk-card';

    let thumbContent;
    if (p.image) {
      thumbContent = '<img src="./' + p.image + '" alt="' + escHtml(p.name) + '" loading="lazy" />';
    } else {
      thumbContent = '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:#8a8d88;opacity:.55"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="9" cy="9" r="1.6"></circle><path d="m21 15-5-5L5 21"></path></svg>';
    }

    let listLine = '';
    if (state.discount > 0) {
      listLine = '<p class="dk-price-list">' + escHtml(listText) + '</p>';
    }

    let copyClass = 'dk-copy-btn';
    let copyText = 'Kopyala';
    if (isCopied) { copyClass += ' copied'; copyText = 'Kopyalandı ✓'; }
    if (isError) { copyText = 'Olmadı'; }

    card.innerHTML =
      '<div class="dk-thumb">' + thumbContent + '</div>' +
      '<div class="dk-card-body">' +
        '<div class="dk-card-meta">' +
          '<span class="dk-card-code">' + escHtml(p.code) + '</span>' +
          '<span class="dk-card-cat">' + escHtml(p.mainCategory) + '</span>' +
          '<span class="dk-stock-badge" style="color:' + sm.fg + ';border-color:' + sm.border + ';background:' + sm.bg + '">' +
            '<span class="dk-stock-dot" style="background:' + sm.dot + '"></span>' + escHtml(sm.label) +
          '</span>' +
        '</div>' +
        '<h2 class="dk-card-name">' + escHtml(p.name) + '</h2>' +
        '<p class="dk-card-size">' + escHtml(p.size) + ' · ' + escHtml(p.sourceCategory) + '</p>' +
        '<div class="dk-card-footer">' +
          '<div>' +
            '<p class="dk-price-label">' + escHtml(priceLabel) + '</p>' +
            '<p class="dk-price-value">' + escHtml(activeText) + '</p>' +
            listLine +
          '</div>' +
          '<button type="button" class="' + copyClass + '" data-copy-id="' + escAttr(p.id) + '">' + copyText + '</button>' +
        '</div>' +
      '</div>';

    const copyBtn = card.querySelector('[data-copy-id]');
    copyBtn.addEventListener('click', () => copyProduct(p));

    return card;
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function escAttr(s) {
    return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
  }

  function render() {
    const nq = normalize(state.query);
    const byQuery = catalog.products.filter(p => matches(p, nq));
    const visible = state.category === 'ALL' ? byQuery : byQuery.filter(p => p.mainCategory === state.category);

    els.resultCount.textContent = visible.length;

    if (state.currency === 'TRY') {
      els.currencyStatus.textContent = 'TRY · KDV hariç';
    } else {
      els.currencyStatus.textContent = state.currency + ' · kur 1 ' + state.currency + ' = ' + state.rates[state.currency] + ' ₺';
    }

    buildCurrencyButtons();
    buildDiscountButtons();
    buildCategoryTabs(byQuery);

    els.searchClear.style.display = state.query ? '' : 'none';

    if (visible.length === 0) {
      els.emptyState.style.display = '';
      els.emptyText.textContent = '"' + state.query + '" için sonuç bulunamadı.';
      els.cardList.innerHTML = '';
    } else {
      els.emptyState.style.display = 'none';
      const frag = document.createDocumentFragment();
      visible.forEach(p => frag.appendChild(buildCard(p)));
      els.cardList.innerHTML = '';
      els.cardList.appendChild(frag);
    }
  }

  function selectCurrency(code) {
    if (code === 'TRY') {
      state.currency = 'TRY';
      render();
      return;
    }
    state.pendingCurrency = code;
    els.rateTitle.textContent = code + ' – TRY Kuru';
    els.rateLabel.textContent = '1 ' + code + ' kaç TRY?';
    els.rateInput.value = state.rates[code] || '';
    els.rateError.classList.remove('show');
    els.rateOverlay.style.display = '';
    els.rateInput.focus();
  }

  function applyRate() {
    const raw = String(els.rateInput.value).replace(',', '.');
    const rate = Number(raw);
    if (!Number.isFinite(rate) || rate <= 0 || !state.pendingCurrency) {
      els.rateError.classList.add('show');
      return;
    }
    state.rates[state.pendingCurrency] = rate;
    state.currency = state.pendingCurrency;
    closeRate();
    render();
  }

  function closeRate() {
    els.rateOverlay.style.display = 'none';
  }

  async function copyProduct(p) {
    const active = formatPrice(displayValue(discountedTry(p)));
    const list = formatPrice(displayValue(p.listPrice));
    const dText = state.discount ? ' (%' + state.discount + ' iskonto)' : '';
    const cText = state.currency === 'TRY' ? 'TRY' : state.currency + ' kur ' + state.rates[state.currency];
    const parts = [p.code, p.name, p.size, 'Liste: ' + list, 'Fiyat' + dText + ': ' + active, cText].filter(Boolean);
    try {
      await navigator.clipboard.writeText(parts.join(' | '));
      state.copiedId = p.id;
    } catch (e) {
      state.copiedId = 'ERR:' + p.id;
    }
    render();
    clearTimeout(copyTimeout);
    copyTimeout = setTimeout(() => { state.copiedId = null; render(); }, 1100);
  }

  // Events
  els.searchInput.addEventListener('input', function() {
    state.query = this.value;
    render();
  });

  els.searchClear.addEventListener('click', () => {
    state.query = '';
    els.searchInput.value = '';
    render();
  });

  els.emptyClear.addEventListener('click', () => {
    state.query = '';
    els.searchInput.value = '';
    render();
  });

  els.rateOverlay.addEventListener('click', e => {
    if (e.target === els.rateOverlay) closeRate();
  });

  els.rateModal.addEventListener('click', e => e.stopPropagation());
  els.rateCancel.addEventListener('click', closeRate);
  els.rateApply.addEventListener('click', applyRate);

  els.rateInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') applyRate();
  });

  // Init
  render();
})();
</script>
</body>
</html>
